<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-label="Data model relationships">
  <style>
    .t-disp{font-family:'Archivo Expanded','Archivo',system-ui,sans-serif;font-weight:600}
    .t-mono{font-family:'Martian Mono',ui-monospace,monospace}
    .t-serif{font-family:Georgia,'Times New Roman',serif}
    @media (prefers-color-scheme: dark){
      [fill="#fbf9f4"]{fill:#17171c}
      [fill="#ecebf8"]{fill:#222041}
      [fill="#e6f1ec"]{fill:#14302a}
      [fill="#f4ecdd"]{fill:#2c2517}
      [fill="#f6e7e1"]{fill:#36201a}
      [fill="#2a2620"]{fill:#e9e7e0}
      [fill="#6b6358"]{fill:#b6b0a8}
      [fill="#9a9082"]{fill:#8b867e}
      [fill="#4a45c2"]{fill:#a7a2f0}
      [fill="#2c8a6f"]{fill:#5fc9a8}
      [fill="#946a2a"]{fill:#cf9a4a}
      [fill="#b1543f"]{fill:#e08a72}
      [stroke="#2a2620"]{stroke:#6a665e}
      [stroke="#6b6358"]{stroke:#8a847b}
      [stroke="#4a45c2"]{stroke:#7d78d8}
      [stroke="#2c8a6f"]{stroke:#4aa98a}
      [stroke="#946a2a"]{stroke:#c79a52}
      [stroke="#b1543f"]{stroke:#c97862}
    }
  </style>
  <defs>
    <marker id="er" markerWidth="10" markerHeight="10" refX="8.5" refY="3.1" orient="auto"><path d="M0,0 L8.5,3.1 L0,6.2 Z" fill="#6b6358"/></marker>
  </defs>
  <!-- PROJECT -->
  <rect x="58" y="42" width="300" height="116" fill="#fbf9f4" stroke="#2a2620" stroke-width="1.6"/>
  <rect x="58" y="42" width="300" height="30" fill="#ecebf8" stroke="#2a2620" stroke-width="1.6"/>
  <text x="74" y="62" class="t-disp" font-size="14" fill="#2a2620">PROJECT</text>
  <text x="74" y="91" class="t-mono" font-size="11" fill="#6b6358">name · slug · category</text>
  <text x="74" y="111" class="t-mono" font-size="11" fill="#6b6358">status · tech · links</text>
  <text x="74" y="131" class="t-mono" font-size="11" fill="#6b6358">priority · target date</text>
  <text x="74" y="150" class="t-serif" font-size="12" font-style="italic" fill="#9a9082">&#8220;a thing you&#8217;re building&#8221;</text>
  <!-- TASK -->
  <rect x="542" y="42" width="300" height="116" fill="#fbf9f4" stroke="#2c8a6f" stroke-width="1.6"/>
  <rect x="542" y="42" width="300" height="30" fill="#e6f1ec" stroke="#2c8a6f" stroke-width="1.6"/>
  <text x="558" y="62" class="t-disp" font-size="14" fill="#2a2620">TASK</text>
  <text x="558" y="91" class="t-mono" font-size="11" fill="#6b6358">label · kind</text>
  <text x="558" y="111" class="t-mono" font-size="11" fill="#6b6358">status · claimed-by-run</text>
  <text x="558" y="131" class="t-mono" font-size="11" fill="#6b6358">claim-expires · version</text>
  <text x="558" y="150" class="t-serif" font-size="12" font-style="italic" fill="#9a9082">&#8220;one item of work&#8221;</text>
  <!-- RUN -->
  <rect x="542" y="292" width="300" height="116" fill="#fbf9f4" stroke="#4a45c2" stroke-width="1.6"/>
  <rect x="542" y="292" width="300" height="30" fill="#ecebf8" stroke="#4a45c2" stroke-width="1.6"/>
  <text x="558" y="312" class="t-disp" font-size="14" fill="#2a2620">RUN</text>
  <text x="558" y="341" class="t-mono" font-size="11" fill="#6b6358">agent · status · model</text>
  <text x="558" y="361" class="t-mono" font-size="11" fill="#6b6358">tokens · cost · heartbeat</text>
  <text x="558" y="381" class="t-mono" font-size="11" fill="#6b6358">cancel-requested</text>
  <text x="558" y="400" class="t-serif" font-size="12" font-style="italic" fill="#9a9082">&#8220;one AI work-session&#8221;</text>
  <!-- EVENT -->
  <rect x="58" y="292" width="300" height="116" fill="#fbf9f4" stroke="#946a2a" stroke-width="1.6"/>
  <rect x="58" y="292" width="300" height="30" fill="#f4ecdd" stroke="#946a2a" stroke-width="1.6"/>
  <text x="74" y="312" class="t-disp" font-size="14" fill="#2a2620">EVENT</text>
  <text x="74" y="341" class="t-mono" font-size="11" fill="#6b6358">type · level · summary</text>
  <text x="74" y="361" class="t-mono" font-size="11" fill="#6b6358">seq (order) · payload</text>
  <text x="74" y="381" class="t-mono" font-size="11" fill="#6b6358">links to run/task/project</text>
  <text x="74" y="400" class="t-serif" font-size="12" font-style="italic" fill="#9a9082">&#8220;one line in the log&#8221;</text>
  <!-- relations -->
  <path d="M358,100 L538,100" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#er)"/>
  <text x="448" y="92" text-anchor="middle" class="t-mono" font-size="10" fill="#6b6358" letter-spacing="1">HAS MANY &#9656;</text>
  <path d="M692,158 L692,288" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#er)"/>
  <text x="704" y="226" class="t-mono" font-size="10" fill="#6b6358">A RUN CLAIMS</text>
  <text x="704" y="241" class="t-mono" font-size="10" fill="#6b6358">A TASK &#9662;</text>
  <path d="M538,362 L362,362" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#er)"/>
  <text x="450" y="353" text-anchor="middle" class="t-mono" font-size="10" fill="#6b6358" letter-spacing="1">&#9666; RECORDS MANY</text>
  <path d="M208,158 L208,288" fill="none" stroke="#6b6358" stroke-width="1.4" stroke-dasharray="4 5" marker-end="url(#er)"/>
  <text x="220" y="226" class="t-mono" font-size="10" fill="#9a9082">EVENTS ALSO</text>
  <text x="220" y="241" class="t-mono" font-size="10" fill="#9a9082">TAG A PROJECT</text>
</svg>
