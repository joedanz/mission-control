<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-label="Run end states">
  <style>
    .t-disp{font-family:'Archivo Expanded','Archivo',system-ui,sans-serif;font-weight:600}
    .t-mono{font-family:'Martian Mono',ui-monospace,monospace}
    .t-serif{font-family:Georgia,'Times New Roman',serif}
    @media (prefers-color-scheme: dark){
      [fill="#fbf9f4"]{fill:#17171c}
      [fill="#ecebf8"]{fill:#222041}
      [fill="#e6f1ec"]{fill:#14302a}
      [fill="#f4ecdd"]{fill:#2c2517}
      [fill="#f6e7e1"]{fill:#36201a}
      [fill="#2a2620"]{fill:#e9e7e0}
      [fill="#6b6358"]{fill:#b6b0a8}
      [fill="#9a9082"]{fill:#8b867e}
      [fill="#4a45c2"]{fill:#a7a2f0}
      [fill="#2c8a6f"]{fill:#5fc9a8}
      [fill="#946a2a"]{fill:#cf9a4a}
      [fill="#b1543f"]{fill:#e08a72}
      [stroke="#2a2620"]{stroke:#6a665e}
      [stroke="#6b6358"]{stroke:#8a847b}
      [stroke="#4a45c2"]{stroke:#7d78d8}
      [stroke="#2c8a6f"]{stroke:#4aa98a}
      [stroke="#946a2a"]{stroke:#c79a52}
      [stroke="#b1543f"]{stroke:#c97862}
    }
  </style>
  <defs>
    <marker id="sm" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#6b6358"/></marker>
  </defs>
  <rect x="40" y="78" width="150" height="52" rx="26" fill="#ecebf8" stroke="#4a45c2" stroke-width="1.6"/>
  <text x="115" y="110" text-anchor="middle" class="t-disp" font-size="15" fill="#2a2620">running</text>

  <rect x="372" y="20" width="168" height="48" rx="24" fill="#e6f1ec" stroke="#2c8a6f" stroke-width="1.6"/>
  <text x="456" y="50" text-anchor="middle" class="t-disp" font-size="13.5" fill="#2a2620">completed &#10003;</text>
  <rect x="372" y="88" width="168" height="48" rx="24" fill="#f6e7e1" stroke="#b1543f" stroke-width="1.6"/>
  <text x="456" y="118" text-anchor="middle" class="t-disp" font-size="13.5" fill="#2a2620">failed &#10005;</text>
  <rect x="372" y="150" width="168" height="44" rx="22" fill="#f4ecdd" stroke="#946a2a" stroke-width="1.6"/>
  <text x="456" y="178" text-anchor="middle" class="t-disp" font-size="13" fill="#2a2620">abandoned</text>

  <path d="M190,98 C262,78 304,54 368,46" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#sm)"/>
  <text x="290" y="60" text-anchor="middle" class="t-mono" font-size="9.5" fill="#6b6358">FINISHES OK</text>
  <path d="M190,108 L368,112" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#sm)"/>
  <text x="290" y="103" text-anchor="middle" class="t-mono" font-size="9.5" fill="#6b6358">ERRORS / CANCELLED</text>
  <path d="M190,122 C262,148 304,164 368,172" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#sm)"/>
  <text x="284" y="160" text-anchor="middle" class="t-mono" font-size="9.5" fill="#6b6358">GOES SILENT &#8594; REAPER</text>

  <text x="690" y="96" class="t-serif" font-size="13" font-style="italic" fill="#6b6358">Every run ends in exactly</text>
  <text x="690" y="116" class="t-serif" font-size="13" font-style="italic" fill="#6b6358">one of these three states.</text>
</svg>
