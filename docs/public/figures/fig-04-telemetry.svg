<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" role="img" aria-label="Telemetry flow">
  <style>
    .t-disp{font-family:'Archivo Expanded','Archivo',system-ui,sans-serif;font-weight:600}
    .t-mono{font-family:'Martian Mono',ui-monospace,monospace}
    .t-serif{font-family:Georgia,'Times New Roman',serif}
    @media (prefers-color-scheme: dark){
      [fill="#fbf9f4"]{fill:#17171c}
      [fill="#ecebf8"]{fill:#222041}
      [fill="#e6f1ec"]{fill:#14302a}
      [fill="#f4ecdd"]{fill:#2c2517}
      [fill="#f6e7e1"]{fill:#36201a}
      [fill="#2a2620"]{fill:#e9e7e0}
      [fill="#6b6358"]{fill:#b6b0a8}
      [fill="#9a9082"]{fill:#8b867e}
      [fill="#4a45c2"]{fill:#a7a2f0}
      [fill="#2c8a6f"]{fill:#5fc9a8}
      [fill="#946a2a"]{fill:#cf9a4a}
      [fill="#b1543f"]{fill:#e08a72}
      [stroke="#2a2620"]{stroke:#6a665e}
      [stroke="#6b6358"]{stroke:#8a847b}
      [stroke="#4a45c2"]{stroke:#7d78d8}
      [stroke="#2c8a6f"]{stroke:#4aa98a}
      [stroke="#946a2a"]{stroke:#c79a52}
      [stroke="#b1543f"]{stroke:#c97862}
    }
  </style>
  <defs>
    <marker id="tm" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#6b6358"/></marker>
  </defs>
  <rect x="32" y="38" width="158" height="56" fill="#ecebf8" stroke="#4a45c2" stroke-width="1.3"/>
  <text x="111" y="62" text-anchor="middle" class="t-disp" font-size="12.5" fill="#2a2620">Session start</text>
  <text x="111" y="80" text-anchor="middle" class="t-serif" font-size="11" font-style="italic" fill="#6b6358">&#8220;I&#8217;m beginning&#8221;</text>
  <rect x="32" y="110" width="158" height="56" fill="#ecebf8" stroke="#4a45c2" stroke-width="1.3"/>
  <text x="111" y="134" text-anchor="middle" class="t-disp" font-size="12.5" fill="#2a2620">After each tool</text>
  <text x="111" y="152" text-anchor="middle" class="t-serif" font-size="11" font-style="italic" fill="#6b6358">heartbeat &#8220;alive&#8221;</text>
  <rect x="32" y="182" width="158" height="48" fill="#ecebf8" stroke="#4a45c2" stroke-width="1.3"/>
  <text x="111" y="204" text-anchor="middle" class="t-disp" font-size="12.5" fill="#2a2620">Session stop</text>
  <text x="111" y="221" text-anchor="middle" class="t-serif" font-size="11" font-style="italic" fill="#6b6358">&#8220;done — the tally&#8221;</text>

  <rect x="352" y="92" width="196" height="76" fill="#fbf9f4" stroke="#2a2620" stroke-width="1.6"/>
  <text x="450" y="124" text-anchor="middle" class="t-disp" font-size="14" fill="#2a2620">Intake door</text>
  <text x="450" y="145" text-anchor="middle" class="t-mono" font-size="11" fill="#4a45c2">/api/ingest</text>
  <text x="450" y="161" text-anchor="middle" class="t-serif" font-size="11" font-style="italic" fill="#6b6358">checks a secret token</text>

  <rect x="708" y="92" width="172" height="76" fill="#fbf9f4" stroke="#2a2620" stroke-width="1.6"/>
  <text x="794" y="124" text-anchor="middle" class="t-disp" font-size="14" fill="#2a2620">Database</text>
  <text x="794" y="145" text-anchor="middle" class="t-serif" font-size="11.5" font-style="italic" fill="#6b6358">updates the run</text>
  <text x="794" y="161" text-anchor="middle" class="t-serif" font-size="11.5" font-style="italic" fill="#6b6358">+ writes an event</text>

  <path d="M190,66 C262,76 292,108 350,124" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#tm)"/>
  <path d="M190,138 L350,134" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#tm)"/>
  <path d="M190,206 C262,196 292,164 350,148" fill="none" stroke="#6b6358" stroke-width="1.6" marker-end="url(#tm)"/>
  <path d="M548,130 L704,130" fill="none" stroke="#6b6358" stroke-width="1.8" marker-end="url(#tm)"/>
  <text x="626" y="122" text-anchor="middle" class="t-mono" font-size="9.5" fill="#6b6358">SAVES</text>
</svg>
